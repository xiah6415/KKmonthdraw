<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <script>
      var path = window.location.pathname;
      var search = window.location.search;
      var hash = window.location.hash;
      var query = '?p=' + path.slice(1).replace(/&/g, '~and~') + (search ? '&q=' + search.slice(1).replace(/&/g, '~and~') : '') + hash;
      window.location.replace(window.location.protocol + '//' + window.location.hostname + (window.location.port ? ':' + window.location.port : '') + '/' + query);
    </script>
  </head>
  <body>
  </body>
</html>
